<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Help Desk</title>
  <link rel="stylesheet" href="style.css">

  <script>
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.classList.add("dark");
    }
  </script>
</head>
<body>

<div class="container">

  <aside class="sidebar">
    <h2>HelpDesk</h2>
    <ul>
      <li onclick="mostrarPagina('chamados')">Chamados</li>
      <li onclick="mostrarPagina('dashboard')">Dashboard</li>
      <li onclick="logout()">Sair</li>
    </ul>
  </aside>

  <main class="main">
    <header>
      <h1>Sistema de Suporte</h1>
      <button onclick="toggleTheme()" id="themeBtn">🌙</button>
    </header>

    <section id="dashboard" class="page hidden">
      <div class="cards">
        <div class="card" id="total"></div>
        <div class="card" id="abertos"></div>
        <div class="card" id="resolvidos"></div>
      </div>
    </section>

    <section id="chamados" class="page">
      <div class="form">
        <input type="text" id="chamadoInput" placeholder="Descreva o problema">
        <button onclick="adicionarChamado()">Abrir Chamado</button>

        <select onchange="filtrarChamados(this.value)">
          <option value="todos">Todos</option>
          <option value="aberto">Abertos</option>
          <option value="andamento">Em andamento</option>
          <option value="resolvido">Resolvidos</option>
        </select>
      </div>

      <ul id="listaChamados"></ul>
    </section>
  </main>

</div>

<script src="script.js"></script>
</body>
</html>
